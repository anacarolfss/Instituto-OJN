<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Agendamento</title>
</head>

<body>
    <header class="header"> <!-- INICIO HEADER -->
        <nav class="nav-bar">
            <!-- logo -->
            <div><a href="index.html"><img class="img-logo" src="./img/LOGO-INSTITUTO OJN.png" alt="logo-instituto-ojn">
                </a></div>
        </nav>
    </header> <!-- FIM HEADER -->

    <main class="cadastro-container">
        <section class="cadastro-sessao">
            <div class="coluna-principal">
                <form class="formulario">
                    <h1 class="texto-cadastro">Agendar Visita</h1>
                    <p class="p_cadastro_coluna1" >Preencha as informações abaixo para agendarmos uma visita e conhecer melhor o animal escolhido.  💛</p>
                    <div class="caixa-inputs">
                    <input type="text" class="input_cadastro" placeholder="Nome Completo:" id="i_nome_completo">
                    <input type="text" class="input_cadastro" placeholder="Email:" id="i_email" onblur="limparMensagem()" onkeyup="ValidarEmail()" >
                    </div>
                    <div class="caixa-inputs">
                        <input type="tel" placeholder="Telefone: (11) 99999-9999" id="i_telefone" onblur="limparMensagem()" onkeyup="ValidarTelefone()">
                    </div>
                    <br>
                    <div id="div_mensagem"></div>
                    <button type="button" class="btn-coluna1" onclick="ConfirmarAgendamento()">Confirmar</button>
                </form>
            </div>

        </section>
    </main>

</body>

</html>
<script>
        function ValidarEmail(){
        let Email= i_email.value;
        let Mensagem= ``;

        if (Email.includes('@')){
            Mensagem += "✅ Possui @ <br>";
        }else{
            Mensagem += "❌ Deve conter @ <br>";
        }
        if(Email.includes('.com') || Email.includes('.com.br')){
            Mensagem+= "✅ Domínio válido <br>";
        }else{
            Mensagem+= `❌ Deve terminar com ".com" ou ".com.br" <br>`;
        }

        div_mensagem.innerHTML= Mensagem;

    }

    function limparMensagem(){
            div_mensagem.innerHTML = "";
        }

    function ValidarTelefone(){
        let Telefone=i_telefone.value;
        let Mensagem = "";
        
        if(Telefone.includes('-')){
         Mensagem += "✅ Possui '-' (hífen) <br>";
        }else{
          Mensagem += "❌ '-' (hífen)  <br>";
        }
        if(Telefone.length== 12) {
            Mensagem += "✅ 11 caracteres incluindo DDD e o número do Telefone <br>";
        }else{
             Mensagem += "❌ Deve conter o DDD e o número do telefone <br>"; 
        }

         div_mensagem.innerHTML= Mensagem;

    }
    
    function ConfirmarAgendamento() {
    let NomeCompleto = i_nome_completo.value;
    let Email = i_email.value;
    let Telefone = i_telefone.value;
    let Mensagem = "";

   if (NomeCompleto == '' || Email == '' || Telefone == '') {
        Mensagem = '❌ Todos os campos devem ser preenchidos';
    } 
    else if (!Telefone.includes('-') || Telefone.length != 12) {
        Mensagem = '❌ Telefone inválido';
    } 
    else if (!Email.includes('@') || !(Email.includes('.com') || Email.includes('.com.br'))) {
        Mensagem = '❌ Email inválido';
    } 
    else {
        alert("Verifique seu e-mail: enviamos uma mensagem para confirmar o dia da visita!");
        window.location.href = "index.html";
    }
    div_mensagem.innerHTML= Mensagem;
    
    }
</script>
