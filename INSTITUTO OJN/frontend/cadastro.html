           <main class="cadastro-container">
            <section class="cadastro-sessao">
                <div class="coluna-secundaria">
                    <p class="texto-cadastro-coluna2">Bem-vindo ao Instituto OJN!</p>
                    <p class="p_cadastro">Para ter acesso aos nossos serviços</p>
                    <p class="p_cadastro">Por favor, faça login com suas informações pessoais</p>
                    <a href="login.html" class="btn-coluna2">Entrar</a>
                </div>
                <div class="coluna-principal">
                    <form class="formulario">
                        <h1 class="texto-cadastro">Crie sua conta</h1>
                        <p class="p_cadastro_coluna1">Utilize seus dados pessoais para registrar-se</p>
                <div class="caixa-inputs">
                    <input type="text" class="input_cadastro" placeholder="Nome Completo:" id="i_nome_completo">
                    <input type="text" class="input_cadastro" placeholder="Email:" id="i_email" onblur="limparMensagem()" onkeyup="ValidarEmail()" >
                </div>
                <div class="caixa-inputs">
                    <input type="date" class="input_cadastro" placeholder="Data Nascimento:" id="i_dtNasc">
                    <input type="text"  class="input_cadastro"placeholder="Senha:" id="i_senha" onkeyup="ValidarSenha()" onblur="limparMensagem()">
                </div>
                <input type="password" class="input_cadastro" placeholder="Confirmar senha:" id="i_confirmar">
                <div id="div_mensagem"></div>
                <button type="button" class="btn-coluna1" onclick="Cadastrar()">Cadastrar-se</button>
                </form>
                </div>
              
            </section>
           </main>

<script>
    function ValidarEmail(){
        let Email= i_email.value;
        let Mensagem= ``;

        if (Email.includes('@')){
            Mensagem += "✅ Possui @ <br>";
        }else{
            Mensagem += "❌ Deve conter @ <br>";
        }

        if(Email.includes('.com') || Email.includes('.com.br')){
            Mensagem+= "✅ Domínio válido <br>";
        }else{
            Mensagem+= `❌ Deve terminar com ".com" ou ".com.br" <br>`;
        }

        div_mensagem.innerHTML= Mensagem;

    }

    function ValidarSenha(){
        let Senha= i_senha.value;
        let Mensagem="";

        if(Senha.length>7){
            Mensagem += "✅ Mínimo 8 caracteres <br>";
        }else{
            Mensagem += "❌ Mínimo 8 caracteres <br>"; 
        }
        
        let TemNumero = false;
         for (let contador = 0; contador <= 9; contador++) {

        if (Senha.includes(contador.toString())) {
            TemNumero = true;
        }

    }
        if (TemNumero){
            Mensagem += "✅ Possui número <br>";
        }else{
            Mensagem += "❌ Precisa ter número <br>";
        }

        let LetraMinuscula= Senha != Senha.toLowerCase();

        if (LetraMinuscula){
            Mensagem+= ` ✅ Contém letra maíuscula<br>`
        }else{
            Mensagem+= `❌ Deve conter letra maíuscula<br>`

        }

        let LetraMaiuscula = Senha !=Senha.toUpperCase();
        
        if (LetraMaiuscula){
            Mensagem+= `✅ Contém letra minuscula<br>`
        }else{
            Mensagem+= `❌ Deve conter letra minuscula<br>`

        }

        let ConfirmarSenha= i_confirmar.value;

        div_mensagem.innerHTML= Mensagem;
    }

     function limparMensagem(){
            div_mensagem.innerHTML = "";
        }

     function Cadastrar(){
    let NomeCompleto = i_nome_completo.value;
    let Email = i_email.value;
    let DataNascimento = i_dtNasc.value;
    let Senha = i_senha.value;
    let ConfirmarSenha = i_confirmar.value;
    let Mensagem = "";

    if (NomeCompleto == '' || Email == '' || DataNascimento == '' || Senha == '' || ConfirmarSenha == '') {
        Mensagem = '❌ Todos os campos devem ser preenchidos para cadastrar-se'
    } 
    
    else if (!Email.includes('@') || (!Email.includes('.com') && !Email.includes('.com.br'))) {
        Mensagem = `❌ Email inválido`
    } 
    
    else {
        let NumeroValido =
            Senha.includes("0") ||
            Senha.includes("1") ||
            Senha.includes("2") ||
            Senha.includes("3") ||
            Senha.includes("4") ||
            Senha.includes("5") ||
            Senha.includes("6") ||
            Senha.includes("7") ||
            Senha.includes("8") ||
            Senha.includes("9");

        let MaiusculaValida = Senha != Senha.toLowerCase();
        let MinusculaValida = Senha != Senha.toUpperCase();
        let TamanhoValido = Senha.length > 7;

        if (!NumeroValido || !MaiusculaValida || !MinusculaValida || !TamanhoValido) {
            Mensagem = "❌ Senha fraca";
        } 
        
        else if (Senha !== ConfirmarSenha) {
            Mensagem = "❌ As senhas devem ser iguais";
        } 
        
        else {
            alert('Tudo correto')
            window.location.href = "login.html";
        }
    }

    div_mensagem.innerHTML = Mensagem;
}
</script>
